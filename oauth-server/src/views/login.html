<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(160deg, #f5f7fb 0%, #e8eef9 100%);
        color: #1f2937;
      }
      .shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        padding: 32px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.5;
        color: #475569;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        font-size: 1rem;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        background: #1d4ed8;
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      .error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
      }
      .hint {
        margin-top: 16px;
        font-size: 0.92rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <h1>{{title}}</h1>
        <p>{{description}}</p>
        {{error_block}}
        <form method="post" action="/login">
          {{hidden_inputs}}
          <label for="email">Email</label>
          <input id="email" name="email" type="email" value="{{email_value}}" autocomplete="username" required>

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>

          <button type="submit">Sign in</button>
        </form>
        <p class="hint">Use the same account credentials that should be linked to Alexa.</p>
      </div>
    </div>
  </body>
</html>
